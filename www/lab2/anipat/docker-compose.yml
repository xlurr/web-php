version: '3.9'

services:
  lab2-apache-php:
    build: .
    container_name: lab2-apache-php
    ports:
      - "8090:80"
    volumes:
      - ./www:/var/www/html
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html
    networks:
      - lab2-network

networks:
  lab2-network:
    driver: bridge
